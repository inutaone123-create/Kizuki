<!DOCTYPE html>
<!--
  Kizuki - イシュー管理 × 作業メモ
  Personal kanban tool integrating issue management and work logs.
  This implementation: 2026
  License: MIT
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kizuki — カンバン</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- SortableJS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <!-- marked.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header class="app-header">
  <h1>🏯 Kizuki</h1>
  <div class="header-actions">
    <button id="btn-new-issue" class="btn btn-primary">＋ 新規イシュー</button>
  </div>
</header>

<!-- ── Filter bar ────────────────────────────────────────────────── -->
<div class="filter-bar">
  <label>フィルター:</label>
  <select id="filter-status">
    <option value="">すべてのステータス</option>
    <option value="todo">未着手</option>
    <option value="in_progress">進行中</option>
    <option value="done">完了</option>
  </select>
  <select id="filter-priority">
    <option value="">すべての優先度</option>
    <option value="high">🔴 高</option>
    <option value="medium">🟡 中</option>
    <option value="low">🟢 低</option>
  </select>
  <select id="filter-category">
    <option value="">すべてのカテゴリ</option>
  </select>
</div>

<!-- ── Kanban board ──────────────────────────────────────────────── -->
<main class="board">
  <!-- 未着手 -->
  <div class="column">
    <div class="column-header todo">
      <h2>未着手</h2>
      <span class="column-count" id="count-todo">0</span>
    </div>
    <div class="column-body" id="col-todo" data-status="todo"></div>
  </div>

  <!-- 進行中 -->
  <div class="column">
    <div class="column-header in-progress">
      <h2>進行中</h2>
      <span class="column-count" id="count-in_progress">0</span>
    </div>
    <div class="column-body" id="col-in_progress" data-status="in_progress"></div>
  </div>

  <!-- 完了 -->
  <div class="column">
    <div class="column-header done">
      <h2>完了</h2>
      <span class="column-count" id="count-done">0</span>
    </div>
    <div class="column-body" id="col-done" data-status="done"></div>
  </div>
</main>

<!-- ── Modal: 新規/編集 ─────────────────────────────────────────── -->
<div id="modal-issue" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-issue-title-text">新規イシュー</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="issue-form">
        <input type="hidden" id="issue-id">

        <div class="form-group">
          <label for="f-title">タイトル <span style="color:red">*</span></label>
          <input type="text" id="f-title" required placeholder="イシューのタイトル">
        </div>

        <div class="form-group">
          <label for="f-description">説明</label>
          <textarea id="f-description" placeholder="イシューの詳細説明（任意）"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-status">ステータス</label>
            <select id="f-status">
              <option value="todo">未着手</option>
              <option value="in_progress">進行中</option>
              <option value="done">完了</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-priority">優先度</label>
            <select id="f-priority">
              <option value="high">🔴 高</option>
              <option value="medium" selected>🟡 中</option>
              <option value="low">🟢 低</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-category">カテゴリ</label>
            <input type="text" id="f-category" placeholder="例: フロントエンド">
          </div>
          <div class="form-group">
            <label for="f-tags">タグ（カンマ区切り）</label>
            <input type="text" id="f-tags" placeholder="例: ui,bug,backend">
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost modal-close">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Modal: 詳細 ──────────────────────────────────────────────── -->
<div id="modal-detail" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>イシュー詳細</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <!-- イシュー情報 -->
      <div class="detail-header-row">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-actions">
          <button id="btn-edit-issue" class="btn btn-ghost btn-sm">✏️ 編集</button>
          <button id="btn-delete-issue" class="btn btn-danger btn-sm">🗑️ 削除</button>
        </div>
      </div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-description" id="detail-description"></div>

      <!-- 作業メモ -->
      <div class="worklogs-section">
        <h3>📝 作業ログ</h3>

        <!-- ログ追加フォーム -->
        <div class="log-form">
          <form id="log-form">
            <div class="form-group">
              <label for="log-date">作業日</label>
              <input type="date" id="log-date" required>
            </div>
            <div class="form-group">
              <label for="log-content">内容（Markdown対応）</label>
              <textarea id="log-content" rows="5"
                placeholder="## 本日の作業&#10;- タスクAを完了&#10;- タスクBを確認"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary btn-sm">追加</button>
            </div>
          </form>
        </div>

        <!-- ログ一覧 -->
        <div id="log-list" class="log-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
