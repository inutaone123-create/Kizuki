<!DOCTYPE html>
<!--
  Kizuki - イシュー管理 × 作業メモ
  Personal kanban tool integrating issue management and work logs.
  This implementation: 2026
  License: MIT
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kizuki — カンバン</title>
  <link rel="stylesheet" href="/static/style.css">
  <!-- SortableJS (vendored for offline use) -->
  <script src="/static/vendor/Sortable.min.js"></script>
  <!-- marked.js (vendored for offline use) -->
  <script src="/static/vendor/marked.min.js"></script>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header class="app-header">
  <h1>🏯 Kizuki</h1>
  <div class="header-actions">
    <button id="btn-new-issue" class="btn btn-primary">＋ 新規イシュー</button>
  </div>
</header>

<!-- ── Tab bar ───────────────────────────────────────────────────── -->
<nav class="tab-bar">
  <button class="tab-btn active" data-tab="board">🏯 カンバン</button>
  <button class="tab-btn" data-tab="memo">📝 メモ</button>
  <button class="tab-btn" data-tab="workflow">🔄 ワークフロー</button>
  <button class="tab-btn" data-tab="report">📊 レポート</button>
  <button class="tab-btn" data-tab="settings">⚙ 設定</button>
</nav>

<!-- ── Filter bar ────────────────────────────────────────────────── -->
<div class="filter-bar" id="board-filter-bar">
  <label>フィルター:</label>
  <select id="filter-status">
    <option value="">すべてのステータス</option>
    <option value="todo">未着手</option>
    <option value="in_progress">進行中</option>
    <option value="done">完了</option>
  </select>
  <select id="filter-priority">
    <option value="">すべての優先度</option>
    <option value="high">🔴 高</option>
    <option value="medium">🟡 中</option>
    <option value="low">🟢 低</option>
  </select>
  <select id="filter-category">
    <option value="">すべてのカテゴリ</option>
  </select>
</div>

<!-- ── Kanban board ──────────────────────────────────────────────── -->
<main class="board tab-content active" id="tab-board">
  <!-- 未着手 -->
  <div class="column">
    <div class="column-header todo">
      <h2>未着手</h2>
      <span class="column-count" id="count-todo">0</span>
    </div>
    <div class="column-body" id="col-todo" data-status="todo"></div>
  </div>

  <!-- 進行中 -->
  <div class="column">
    <div class="column-header in-progress">
      <h2>進行中</h2>
      <span class="column-count" id="count-in_progress">0</span>
    </div>
    <div class="column-body" id="col-in_progress" data-status="in_progress"></div>
  </div>

  <!-- 完了 -->
  <div class="column">
    <div class="column-header done">
      <h2>完了</h2>
      <span class="column-count" id="count-done">0</span>
    </div>
    <div class="column-body" id="col-done" data-status="done"></div>
  </div>
</main>

<!-- ── Memo screen ───────────────────────────────────────────────── -->
<div class="memo-screen tab-content" id="tab-memo">
  <div class="memo-toolbar">
    <span class="memo-count" id="memo-count">0 件</span>
    <button id="btn-new-memo" class="btn btn-primary btn-sm">＋ 新規メモ</button>
  </div>
  <div id="memo-list" class="memo-list"></div>
</div>

<!-- ── Workflow matrix screen ────────────────────────────────────── -->
<div class="workflow-matrix-screen tab-content" id="tab-workflow">
  <div id="workflow-matrix-body"></div>
</div>

<!-- ── Report screen ─────────────────────────────────────────────── -->
<div class="report-screen tab-content" id="tab-report">
  <div class="report-toolbar">
    <div class="report-type-group">
      <button class="report-type-btn active" data-type="daily">日報</button>
      <button class="report-type-btn" data-type="weekly">週報</button>
      <button class="report-type-btn" data-type="monthly">月報</button>
    </div>
    <div class="report-toolbar-right">
      <input type="date" id="report-target-date" class="report-date-picker">
      <button id="btn-generate-report" class="btn btn-primary btn-sm">⚡ 生成</button>
    </div>
  </div>
  <div id="report-generating" class="report-generating" style="display:none">
    <div class="spinner"></div>
    <span>レポートを生成中...</span>
  </div>
  <div id="report-list" class="report-list"></div>
</div>

<!-- ── Settings screen ──────────────────────────────────────────── -->
<div class="settings-screen tab-content" id="tab-settings">

  <!-- メンバー管理 -->
  <section class="settings-section">
    <div class="settings-section-header">
      <h2>👤 メンバー管理</h2>
      <button id="btn-new-member" class="btn btn-primary btn-sm">＋ 追加</button>
    </div>
    <div id="member-list" class="member-list"></div>
  </section>

  <!-- ワークフロー管理 -->
  <section class="settings-section">
    <div class="settings-section-header">
      <h2>🔄 ワークフロー管理</h2>
      <div style="display:flex;gap:0.5rem">
        <button id="btn-suggest-workflow" class="btn btn-ghost btn-sm">💡 AI提案</button>
        <button id="btn-new-workflow" class="btn btn-primary btn-sm">＋ 追加</button>
      </div>
    </div>
    <div id="workflow-list" class="workflow-list"></div>
  </section>

  <!-- AI設定 -->
  <section class="settings-section">
    <div class="settings-section-header">
      <h2>🤖 AI設定</h2>
      <button id="btn-edit-ai-settings" class="btn btn-ghost btn-sm">✏️ 編集</button>
    </div>
    <div id="ai-settings-info" class="ai-settings-info"></div>
  </section>

</div>

<!-- ── Modal: 新規/編集イシュー ──────────────────────────────────── -->
<div id="modal-issue" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-issue-title-text">新規イシュー</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="issue-form">
        <input type="hidden" id="issue-id">

        <div class="form-group">
          <label for="f-title">タイトル <span style="color:red">*</span></label>
          <input type="text" id="f-title" required placeholder="イシューのタイトル">
        </div>

        <div class="form-group">
          <label for="f-description">説明</label>
          <textarea id="f-description" placeholder="イシューの詳細説明（任意）"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-status">ステータス</label>
            <select id="f-status">
              <option value="todo">未着手</option>
              <option value="in_progress">進行中</option>
              <option value="done">完了</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-priority">優先度</label>
            <select id="f-priority">
              <option value="high">🔴 高</option>
              <option value="medium" selected>🟡 中</option>
              <option value="low">🟢 低</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-category">カテゴリ</label>
            <input type="text" id="f-category" placeholder="例: フロントエンド">
          </div>
          <div class="form-group">
            <label for="f-tags">タグ（カンマ区切り）</label>
            <input type="text" id="f-tags" placeholder="例: ui,bug,backend">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="f-assignee">担当者</label>
            <select id="f-assignee">
              <option value="">なし</option>
            </select>
          </div>
          <div class="form-group">
            <label for="f-workflow">ワークフロー</label>
            <select id="f-workflow">
              <option value="">なし</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost modal-close">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Modal: 詳細 ──────────────────────────────────────────────── -->
<div id="modal-detail" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>イシュー詳細</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <!-- イシュー情報 -->
      <div class="detail-header-row">
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-actions">
          <button id="btn-edit-issue" class="btn btn-ghost btn-sm">✏️ 編集</button>
          <button id="btn-delete-issue" class="btn btn-danger btn-sm">🗑️ 削除</button>
        </div>
      </div>
      <div class="detail-meta" id="detail-meta"></div>
      <div class="detail-description" id="detail-description"></div>

      <!-- ワークフロー進捗 -->
      <div id="workflow-section" class="workflow-section" style="display:none">
        <h3>🔄 ワークフロー進捗</h3>
        <div id="workflow-steps" class="workflow-steps"></div>
        <div class="workflow-nav">
          <button id="btn-wf-prev" class="btn btn-ghost btn-sm">← 戻す</button>
          <button id="btn-wf-next" class="btn btn-primary btn-sm">次のステップへ →</button>
        </div>
      </div>

      <!-- 依存関係 -->
      <div class="dependency-section">
        <h3>🔒 依存関係</h3>
        <div id="dep-blocked-by" class="dep-list">
          <div class="dep-list-header">
            <span class="dep-list-label">このタスクのブロッカー（完了が必要）</span>
            <button id="btn-add-dep" class="btn btn-ghost btn-sm">＋ 追加</button>
          </div>
          <div id="dep-blocked-by-items"></div>
        </div>
      </div>

      <!-- 紐付きメモ -->
      <div class="memos-section" id="detail-memos-section">
        <div class="memos-section-header">
          <h3>🗒️ 紐付きメモ</h3>
          <button id="btn-add-memo-from-detail" class="btn btn-ghost btn-sm">＋ 新規メモ</button>
        </div>
        <div id="detail-memo-list" class="log-list"></div>
      </div>

      <!-- 作業メモ -->
      <div class="worklogs-section">
        <h3>📝 作業ログ</h3>

        <!-- ログ追加フォーム -->
        <div class="log-form">
          <form id="log-form">
            <div class="form-group">
              <label for="log-date">作業日</label>
              <input type="date" id="log-date" required>
            </div>
            <div class="form-group">
              <label for="log-content">内容（Markdown対応）</label>
              <textarea id="log-content" rows="5"
                placeholder="## 本日の作業&#10;- タスクAを完了&#10;- タスクBを確認"></textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn btn-primary btn-sm">追加</button>
            </div>
          </form>
        </div>

        <!-- ログ一覧 -->
        <div id="log-list" class="log-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ── Modal: メモ作成/編集 ─────────────────────────────────────── -->
<div id="modal-memo" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-memo-title-text">新規メモ</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="memo-form">
        <input type="hidden" id="memo-id">

        <div class="form-group">
          <label for="m-date">日付</label>
          <input type="date" id="m-date" required>
        </div>

        <div class="form-group">
          <label for="m-content">内容（Markdown対応）</label>
          <textarea id="m-content" rows="8"
            placeholder="## メモ内容&#10;- 気づいたこと&#10;- あとでタスクに紐付けたいこと"></textarea>
        </div>

        <div class="form-group">
          <label for="m-issue">タスク紐付け（任意）</label>
          <select id="m-issue">
            <option value="">なし</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-ghost modal-close">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Modal: メンバー作成/編集 ─────────────────────────────────── -->
<div id="modal-member" class="modal-overlay" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="modal-member-title-text">新規メンバー</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="member-form">
        <input type="hidden" id="member-id">
        <div class="form-group">
          <label for="mb-name">名前 <span style="color:red">*</span></label>
          <input type="text" id="mb-name" required placeholder="担当者名">
        </div>
        <div class="form-group">
          <label for="mb-color">カラー</label>
          <div class="color-input-row">
            <input type="color" id="mb-color" value="#6366f1" class="color-picker">
            <span id="mb-color-text">#6366f1</span>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost modal-close">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Modal: ワークフロー作成/編集 ─────────────────────────────── -->
<div id="modal-workflow" class="modal-overlay" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2 id="modal-workflow-title-text">新規ワークフロー</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="workflow-form">
        <input type="hidden" id="wf-id">
        <div class="form-group">
          <label for="wf-name">ワークフロー名 <span style="color:red">*</span></label>
          <input type="text" id="wf-name" required placeholder="例: 承認フロー">
        </div>
        <div class="form-group">
          <label>ステップ（カンマ区切り） <span style="color:red">*</span></label>
          <input type="text" id="wf-steps" required placeholder="例: 申請,承認,実行,完了">
          <small style="color:var(--text-muted);font-size:0.78rem;">カンマで区切って入力してください</small>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost modal-close">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Modal: AI設定 ──────────────────────────────────────────────── -->
<div id="modal-ai-settings" class="modal-overlay" style="display:none">
  <div class="modal modal-sm">
    <div class="modal-header">
      <h2>🤖 AI設定</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <form id="ai-settings-form">
        <div class="form-group">
          <label for="ai-base-url">Base URL</label>
          <input type="url" id="ai-base-url" placeholder="例: https://api.groq.com/openai/v1">
          <small style="color:var(--text-muted);font-size:0.78rem;">OpenAI互換APIのエンドポイント</small>
        </div>
        <div class="form-group">
          <label for="ai-api-key">API Key <small>（変更する場合のみ入力）</small></label>
          <input type="password" id="ai-api-key" placeholder="sk-...（変更する場合のみ入力）">
        </div>
        <div class="form-group">
          <label for="ai-model">モデル名</label>
          <input type="text" id="ai-model" placeholder="例: llama3-8b-8192, gpt-4o-mini">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost modal-close">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- ── Modal: レポート詳細 ────────────────────────────────────────── -->
<div id="modal-report" class="modal-overlay" style="display:none">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h2 id="report-modal-title">レポート</h2>
      <button class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="report-meta" id="report-modal-meta"></div>
      <div class="report-content" id="report-modal-content"></div>
    </div>
  </div>
</div>

<!-- ── Modal: ワークフロー AI提案 ──────────────────────────────────── -->
<div id="modal-suggest-workflow" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>💡 ワークフロー提案</h2>
      <button id="btn-close-suggest-workflow" class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div id="suggest-loading" style="text-align:center;padding:2rem">
        <div class="spinner"></div>
        <p>タスクを分析中...</p>
      </div>
      <div id="suggest-result" style="display:none">
        <div class="form-group">
          <label>提案ワークフロー名</label>
          <input type="text" id="suggest-name" class="suggest-name-input">
        </div>
        <div class="form-group">
          <label>提案ステップ</label>
          <div id="suggest-steps-list" class="suggest-steps-list"></div>
          <p id="suggest-reason" class="suggest-reason"></p>
        </div>
        <div class="form-group">
          <label for="suggest-category">カテゴリで絞り込んで再提案</label>
          <div style="display:flex;gap:0.5rem">
            <input type="text" id="suggest-category" placeholder="例: フロントエンド">
            <button id="btn-re-suggest" class="btn btn-ghost btn-sm">🔄 再提案</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" id="btn-cancel-suggest-workflow">キャンセル</button>
          <button id="btn-approve-workflow" class="btn btn-primary">✅ このワークフローを保存</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script src="/static/app.js"></script>
</body>
</html>
